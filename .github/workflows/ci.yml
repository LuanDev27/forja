name: CI

on:
  push:
    branches: [main, "0*"]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    env:
      GODOT_VERSION: 4.4.1-stable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build (todas as camadas)
        run: dotnet build Forja.Studio.sln -c Release

      - name: Testes .NET (Anvil, Core, Bellows, Arquitetura)
        run: dotnet test Forja.Studio.sln -c Release --no-build --logger "trx;LogFileName=results.trx"

      # O Godot não-exportado carrega o assembly de .godot/mono/temp/bin/Debug —
      # o build Release acima não serve para o passo headless.
      - name: Build Debug (assembly carregado pelo Godot headless)
        run: dotnet build Forja.Studio.sln

      - name: Baixar Godot ${{ env.GODOT_VERSION }} (.NET)
        shell: pwsh
        run: |
          $url = "https://github.com/godotengine/godot/releases/download/$env:GODOT_VERSION/Godot_v$($env:GODOT_VERSION)_mono_win64.zip"
          Invoke-WebRequest $url -OutFile godot.zip
          Expand-Archive godot.zip -DestinationPath godot-bin

      - name: Importar assets (headless)
        shell: pwsh
        run: |
          $godot = Get-ChildItem godot-bin -Recurse -Filter "*console.exe" | Select-Object -First 1 -ExpandProperty FullName
          & $godot --headless --import --path .

      - name: Testes headless (física + determinismo — Artigo V)
        shell: pwsh
        run: |
          $godot = Get-ChildItem godot-bin -Recurse -Filter "*console.exe" | Select-Object -First 1 -ExpandProperty FullName
          & $godot --headless --path . -- --forja-tests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
